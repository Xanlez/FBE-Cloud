{% extends "base.html" %}

{% block title %}Смена пароля — FBE cloud{% endblock %}

{% block content %}
<h1 class="page-title">Смена пароля</h1>
<div class="card form-card">
  <p style="color: var(--muted); margin-top:0;">
    Нажмите кнопку, получите код на почту, затем введите код и новый пароль.
  </p>

  {% if error %}
    <ul class="messages"><li class="error">{{ error }}</li></ul>
  {% endif %}
  {% if success %}
    <ul class="messages"><li>{{ success }}</li></ul>
  {% endif %}

  <form method="post" action="{{ request.url_for('profile_send_code') }}">
    <button type="submit" class="btn btn-ghost" style="width:100%;">Отправить код на почту</button>
  </form>

  <form method="post" action="{{ request.url_for('profile_update_password') }}" style="margin-top:1rem;">
    <div class="form-group">
      <label for="id_code">Код из письма</label>
      <input id="id_code" name="code" class="form-input" maxlength="6" minlength="6" required>
    </div>
    <div class="form-group">
      <label for="id_new_password1">Новый пароль</label>
      <input id="id_new_password1" name="new_password1" type="password" class="form-input" required>
    </div>
    <div class="form-group">
      <label for="id_new_password2">Повторите новый пароль</label>
      <input id="id_new_password2" name="new_password2" type="password" class="form-input" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Изменить пароль</button>
  </form>
</div>
{% endblock %}
