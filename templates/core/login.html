{% extends "base.html" %}

{% block title %}Вход — FBE cloud{% endblock %}

{% block content %}
<h1 class="page-title">Вход</h1>
<div class="card form-card">
  <form method="post" action="{{ path_for(request, 'login_post') }}">
    {% if error %}
      <ul class="messages"><li class="error">{{ error }}</li></ul>
    {% endif %}
    <div class="form-group">
      <label for="id_identifier">Почта или логин</label>
      <input id="id_identifier" name="identifier" class="form-input" value="{{ value }}" placeholder="Введите email или username" required>
    </div>
    <div class="form-group">
      <label for="id_password">Пароль</label>
      <input id="id_password" name="password" type="password" class="form-input" required>
      <p class="form-help-link">
        <a href="/accounts/forgot-password/">Забыли пароль?</a>
      </p>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Войти</button>
  </form>
  <p style="margin-top:1.25rem; text-align:center; color: var(--muted); font-size:0.9rem;">
    Нет аккаунта? <a href="{{ path_for(request, 'register') }}">Зарегистрироваться</a>
  </p>
</div>
{% endblock %}
